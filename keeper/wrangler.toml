name = "shunt-keeper"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# Poll Horizon for new USDC inflows once a minute — Workers Cron Triggers
# are free and don't sleep, unlike a container-based host.
[triggers]
crons = ["* * * * *"]

# Create with: npx wrangler kv namespace create KEEPER_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "KEEPER_KV"
id = "829f8ec8dacc45ab863c23cc71779bb1"

[vars]
STELLAR_NETWORK = "testnet"
HORIZON_URL = "https://horizon-testnet.stellar.org"
SOROBAN_RPC_URL = "https://soroban-testnet.stellar.org"
NETWORK_PASSPHRASE = "Test SDF Network ; September 2015"
USDC_CODE = "USDC"
USDC_ISSUER = "GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5"
VAULT_CONTRACT_ID = "CDMFJZ6VRD2JEV7J2W7KMZZ3AXNSOST2C6L2KYRJAYIN7ULWJEOCWO5B"
WATCH_ACCOUNTS = "GC4IUJPBQZKXYONI6UABEXE7EA6QXT4OYV2JYJA5GTPMXSMEKDL6AGDZ"
# CORS allowlist for the deployed frontend, and per-IP /trigger cap per minute.
ALLOWED_ORIGINS = "https://shunt-app.vercel.app"
TRIGGER_RATE_PER_MIN = "30"
