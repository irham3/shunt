<svg width="900" height="250" viewBox="0 0 900 250"
     xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="1" stop-color="#101822"/>
    </linearGradient>
    <path id="laneIn" d="M 375,125 H 520"/>
    <path id="laneA"  d="M 520,125 C 570,125 570,40  620,40  H 700"/>
    <path id="laneB"  d="M 520,125 C 570,125 570,96  620,96  H 700"/>
    <path id="laneC"  d="M 520,125 C 570,125 570,152 620,152 H 700"/>
    <path id="laneD"  d="M 520,125 C 570,125 570,208 620,208 H 700"/>
  </defs>

  <rect width="900" height="250" rx="18" fill="url(#bgGrad)"/>
  <rect x="0.5" y="0.5" width="899" height="249" rx="17.5" fill="none" stroke="#1d2734"/>

  <!-- faint circuit texture -->
  <g stroke="#16202c" stroke-width="1" fill="none">
    <path d="M 40,220 H 180 V 200"/>
    <path d="M 860,30 H 740 V 52"/>
    <circle cx="180" cy="196" r="3"/>
    <circle cx="740" cy="56" r="3"/>
  </g>

  <!-- wordmark -->
  <g>
    <text x="48" y="118" font-size="54" font-weight="700" fill="#F5F7FA" letter-spacing="-1">Shunt</text>
    <text x="218" y="118" font-size="44" fill="#D8F15A">⑃</text>
    <text x="48" y="152" font-size="17" fill="#8A93A3">Automated money routing.</text>
    <text x="48" y="176" font-size="13" fill="#5c6b7d">Non-custodial USDC autopilot on Stellar</text>
  </g>

  <!-- circuit lanes (versi redup dari tiap warna) -->
  <g fill="none" stroke-linecap="round">
    <use href="#laneIn" stroke="#2a3648" stroke-width="3"/>
    <use href="#laneA" stroke="#23394d" stroke-width="3"/>
    <use href="#laneB" stroke="#3a4022" stroke-width="3"/>
    <use href="#laneC" stroke="#3d2f16" stroke-width="3"/>
    <use href="#laneD" stroke="#2e2a4a" stroke-width="3"/>
  </g>

  <!-- split node: denyut pas momen handoff (37.5% siklus) -->
  <circle cx="520" cy="125" r="9" fill="#0B0F14" stroke="#D8F15A" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="r" values="8;8;11;8;8" keyTimes="0;0.375;0.44;0.55;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- moving pulses: 1 siklus 3.2s — masuk 0–37.5%, menyebar 37.5–75%, flash+jeda 75–100% -->
  <circle r="5" fill="#F5F7FA" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" calcMode="linear"
                   keyPoints="0;1;1" keyTimes="0;0.375;1">
      <mpath href="#laneIn"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0;0"
             keyTimes="0;0.04;0.33;0.375;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <circle r="4.5" fill="#74BDF6" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" calcMode="linear"
                   keyPoints="0;0;1;1" keyTimes="0;0.375;0.75;1">
      <mpath href="#laneA"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0;1;1;1;0"
             keyTimes="0;0.375;0.42;0.75;0.82;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <circle r="4.5" fill="#D8F15A" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" calcMode="linear"
                   keyPoints="0;0;1;1" keyTimes="0;0.375;0.75;1">
      <mpath href="#laneB"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0;1;1;1;0"
             keyTimes="0;0.375;0.42;0.75;0.82;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <circle r="4.5" fill="#E19E24" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" calcMode="linear"
                   keyPoints="0;0;1;1" keyTimes="0;0.375;0.75;1">
      <mpath href="#laneC"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0;1;1;1;0"
             keyTimes="0;0.375;0.42;0.75;0.82;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <circle r="4.5" fill="#A08BF7" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" calcMode="linear"
                   keyPoints="0;0;1;1" keyTimes="0;0.375;0.75;1">
      <mpath href="#laneD"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0;1;1;1;0"
             keyTimes="0;0.375;0.42;0.75;0.82;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- lane chips: border menyala saat pulse tiba (75% siklus) -->
  <g font-size="14" font-weight="600">
    <rect x="706" y="22" width="150" height="36" rx="10" fill="#141A21" stroke="#74BDF6" stroke-opacity=".55">
      <animate attributeName="stroke-opacity" values=".55;.55;1;1;.55"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1;1;2.5;2.5;1"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="726" cy="40" r="5" fill="#74BDF6"/>
    <text x="740" y="45" fill="#F5F7FA">Needs</text>
    <text x="846" y="45" fill="#74BDF6" text-anchor="end">50%</text>

    <rect x="706" y="78" width="150" height="36" rx="10" fill="#141A21" stroke="#D8F15A" stroke-opacity=".55">
      <animate attributeName="stroke-opacity" values=".55;.55;1;1;.55"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1;1;2.5;2.5;1"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="726" cy="96" r="5" fill="#D8F15A"/>
    <text x="740" y="101" fill="#F5F7FA">Savings</text>
    <text x="846" y="101" fill="#D8F15A" text-anchor="end">25%</text>

    <rect x="706" y="134" width="150" height="36" rx="10" fill="#141A21" stroke="#E19E24" stroke-opacity=".55">
      <animate attributeName="stroke-opacity" values=".55;.55;1;1;.55"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1;1;2.5;2.5;1"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="726" cy="152" r="5" fill="#E19E24"/>
    <text x="740" y="157" fill="#F5F7FA">Buffer</text>
    <text x="846" y="157" fill="#E19E24" text-anchor="end">15%</text>

    <rect x="706" y="190" width="150" height="36" rx="10" fill="#141A21" stroke="#A08BF7" stroke-opacity=".55">
      <animate attributeName="stroke-opacity" values=".55;.55;1;1;.55"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1;1;2.5;2.5;1"
               keyTimes="0;0.75;0.78;0.9;1" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="726" cy="208" r="5" fill="#A08BF7"/>
    <text x="740" y="213" fill="#F5F7FA">Invest</text>
    <text x="846" y="213" fill="#A08BF7" text-anchor="end">10%</text>
  </g>

  <!-- incoming label -->
  <g font-size="12" fill="#8A93A3">
    <text x="378" y="112">USDC in</text>
  </g>
</svg>