<!-- Interactive Layer: Ambient Glow Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const glow = document.querySelector('.bg-primary-container\\/5');
            if (glow) {
                glow.style.transform = `translate(${(x - 0.5) * 20}px, ${(y - 0.5) * 20}px)`;
            }
        });

        // Simple carousel tap logic for demo purposes
        const indicators = document.querySelectorAll('.h-1');
        let currentSlide = 0;
        
        // Auto-animate indicators to show vitality
        setInterval(() => {
            indicators[currentSlide].classList.replace('indicator-active', 'indicator-inactive');
            currentSlide = (currentSlide + 1) % 3;
            indicators[currentSlide].classList.replace('indicator-inactive', 'indicator-active');
        }, 4000);
    </script>
